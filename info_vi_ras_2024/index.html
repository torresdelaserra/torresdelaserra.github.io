<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Informació nutricional - Vi RAS 2024</title>

  <meta name="robots" content="noindex, nofollow, noarchive">
  <link rel="icon" href="../img/torresdelaserra_logo.svg" type="image/svg+xml">
  <style>
    :root {
      --bg: #f5f1ea;
      --paper: #faf7f1;
      --text: #2a2a28;
      --line: rgba(61, 74, 42, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
    }

    main {
      width: min(100%, 720px);
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 1.25rem;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <main>
